# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.jsonschema.json

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: true

linters:
  # `default: all` makes it hard to keep this service maintainable:
  # it pulls in many style/opinion linters that require large refactors
  # without improving correctness. Prefer a curated, correctness-focused set.
  default: none
  enable:
    - bodyclose
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - gocritic
    - gosec
    - govet
    - ineffassign
    - nilerr
    # `noctx` is a good practice, but it flags many existing tests and adds little value
    # for this mock service. Prefer keeping tests readable and deterministic.
    # (We still use contexts explicitly where it matters in production code.)
    # - noctx
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  disable:
    - depguard    # Too restrictive for most projects
    - tagalign    # Aesthetic only
    - nonamedreturns # Opinionated; sometimes named returns are better
    - exhaustruct  # Too noisy (especially for stdlib structs) relative to value
    - gochecknoglobals # This service is currently structured around shared state; refactor later if needed
    - gochecknoinits # Allow `init` in tests where it improves readability
    - gocognit     # Large handlers will be split as part of componentization work, but don't block lint now
    - paralleltest # Adding `t.Parallel()` can introduce flakiness in tests using shared state/files
    - forcetypeassert # We prefer explicit error handling over type-assert-only patterns in some places
    - tagliatelle  # Tag casing is dictated by upstream protocols/configs
    - varnamelen   # Avoid artificial renames; focus on correctness
    - wsl          # Deprecated; and whitespace/style shouldn't block builds
    - wsl_v5       # Whitespace/style shouldn't block builds
  settings:
    cyclop:
      max-complexity: 10
    funlen:
      lines: 60
      statements: 40
    maintidx:
      under: 20
    lll:
      line-length: 120
    revive:
      # Keep revive focused on correctness and maintainability.
      # Some rules (line-length, function-length, add-constant, package-comments)
      # are too noisy for this service and would require large stylistic refactors.
      severity: error
      rules:
        - name: atomic
        - name: early-return
        - name: error-strings
        - name: errorf
        - name: identical-branches
        - name: range
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unused-parameter
        - name: useless-break
        - name: var-naming
    gosec:
      excludes:
        - G304 # File path is validated/controlled in this dev-only mock server and in tests
        - G703 # Path traversal taint analysis overlaps with G304 for this codebase
        - G706 # Logging of request fields is expected in this dev environment; `%q` is used to quote values
    staticcheck:
      checks: ["all"]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false

output:
  formats:
    text:
      path: stdout
      colors: true
  sort-order:
    - linter
    - severity
    - file